<VirtualHost *:80>
    ServerName firenetworks.de
    ServerAlias www.firenetworks.de
    
    # Redirect to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName firenetworks.de
    ServerAlias www.firenetworks.de
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/firenetworks.de/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/firenetworks.de/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
    
    # Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin
    
    # ============================================
    # SECURITY: Block sensitive files & folders
    # Added: 2025-11-09 - Protection against scanners
    # ============================================
    <LocationMatch "/(\.env|\.git|\.vscode|\.pm2|node_modules|package\.json|ecosystem\.config\.js|\.sql)">
        Require all denied
    </LocationMatch>
    # Block direct /logs/ directory access (but NOT /console/:id/logs API routes)
    <LocationMatch "^/logs(/|$)">
        Require all denied
    </LocationMatch>
        # Block direct .md file access (Scanner probing for Markdown sources)
    <LocationMatch "\.md$">
        Require all denied
    </LocationMatch>
    
    # Block template injection probes (Hugo/Jekyll/Go-Template scanners)
    <LocationMatch "%7B%7B|%7D%7D|\{\{|\}\}">
        Require all denied
    </LocationMatch>
        # Additional protection for hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    
    # Proxy Settings (global)
    ProxyPreserveHost On
    ProxyTimeout 600
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    
    # ============================================
    # WebSocket Proxy für IPMServer (Port 9340)
    # Pfad: /ws → localhost:9340
    # ============================================
    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/ws
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/ws$ ws://127.0.0.1:9340/ [P,L]
    
    # ============================================
    # Dashboard (Node.js Port 3000)
    # ============================================
    
    # Socket.IO für Dashboard
    ProxyPass /socket.io/ ws://127.0.0.1:3000/socket.io/
    ProxyPassReverse /socket.io/ ws://127.0.0.1:3000/socket.io/
    
    # Alle anderen Requests an Dashboard
    # WebSocket Proxy für Gameserver Console (xterm.js)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{REQUEST_URI} ^/guild/[^/]+/plugins/gameserver/console/ws/ [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:3000%{REQUEST_URI} [P,L]

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/firenetworks_prod_error.log
    CustomLog ${APACHE_LOG_DIR}/firenetworks_prod_access.log combined
</VirtualHost>
</IfModule>
