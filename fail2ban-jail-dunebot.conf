# Fail2ban Jail Konfiguration für DuneBot
# 
# Diese Konfiguration zu /etc/fail2ban/jail.local hinzufügen
# oder als separate Datei nach /etc/fail2ban/jail.d/dunebot.local
#
# Installation:
# 1. Filter nach /etc/fail2ban/filter.d/dunebot-exploits.conf kopieren
# 2. Diese Jail-Config nach /etc/fail2ban/jail.d/dunebot.local kopieren
# 3. Log-Datei erstellen: sudo touch /var/log/dunebot-exploits.log
# 4. Permissions: sudo chown www-data:www-data /var/log/dunebot-exploits.log
# 5. Restart: sudo systemctl restart fail2ban
#

[dunebot-exploits]
enabled = true
port = http,https
filter = dunebot-exploits
logpath = /var/log/dunebot-exploits.log
maxretry = 1
# Nach 1 Eintrag im Log -> sofort bannen!
findtime = 3600
# Suche in den letzten 1 Stunde
bantime = -1
# -1 = PERMANENT BAN (für immer!)
action = iptables-multiport[name=dunebot, port="http,https", protocol=tcp]
# Blockt HTTP + HTTPS Traffic von der IP
