# Fail2ban Filter: DuneBot Database Blocked IPs
# 
# Liest blocked_ips aus MySQL-Datenbank und sperrt IPs via iptables
# 
# Installation:
#   sudo cp fail2ban-filter-dunebot-db.conf /etc/fail2ban/filter.d/dunebot-db.conf
#   sudo cp fail2ban-jail-dunebot-db.conf /etc/fail2ban/jail.d/dunebot-db.conf
#   sudo cp fail2ban-db-reader.py /usr/local/bin/fail2ban-db-reader
#   sudo chmod +x /usr/local/bin/fail2ban-db-reader
#   sudo systemctl restart fail2ban
#
# Prüfung:
#   sudo fail2ban-client status dunebot-db
#   sudo fail2ban-regex /var/log/dunebot-db.log /etc/fail2ban/filter.d/dunebot-db.conf

[INCLUDES]
before = common.conf

[Definition]

# Failregex: IP-Adresse am Anfang der Zeile (Apache-Log-Format)
# Das Python-Script generiert Log-Zeilen wie:
# 4.218.11.42 - - [2025-10-26 14:30:00] "GET /exploit.php HTTP/1.1" 403 0 "-" "DuneBot-DB-Block: SQL Injection Attempt"
failregex = ^<HOST> - - \[.*?\] "GET .* HTTP/.*" 403 .* "DuneBot-DB-Block:

# Ignore-Regex (optional - keine internen IPs sperren)
ignoreregex = ^127\.0\.0\.1
              ^192\.168\.
              ^10\.
              ^172\.(1[6-9]|2[0-9]|3[01])\.
