# Fail2ban Jail für DDoS-Protection
# Banns IPs die zu viele Requests in kurzer Zeit machen
#
# Installation:
#   sudo cp fail2ban-jail-ddos.conf /etc/fail2ban/jail.d/dunebot-ddos.conf
#
# Autor: FireBot Team
# Version: 1.0

[dunebot-ddos]
enabled  = true
port     = http,https
filter   = dunebot-ddos
logpath  = /var/log/apache2/access.log
          /var/log/apache2/*access.log
maxretry = 100
findtime = 60
bantime  = -1
action   = iptables-multiport[name=dunebot-ddos, port="http,https", protocol=tcp]

# Erklärung:
# maxretry = 100   → Ban bei > 100 Requests
# findtime = 60    → ... innerhalb von 60 Sekunden
# bantime  = -1    → PERMANENT (nie wieder!)
           sendmail-whois[name=dunebot-ddos, dest=root, sender=fail2ban@localhost]

# Erklärung:
# maxretry = 100   → Ban bei > 100 Requests
# findtime = 60    → ... innerhalb von 60 Sekunden
# bantime  = 3600  → ... für 1 Stunde (3600s)
#
# Anpassen für strengeren Schutz:
# maxretry = 50, findtime = 30, bantime = 7200 (2 Stunden)
