# Fail2ban Filter für DDoS-Attacken auf DuneBot
# Erkennt zu viele Requests von einer IP innerhalb kurzer Zeit
#
# Installation:
#   sudo cp fail2ban-filter-ddos.conf /etc/fail2ban/filter.d/dunebot-ddos.conf
#
# Autor: FireBot Team
# Version: 1.0

[INCLUDES]
before = common.conf

[Definition]

# DDoS-Muster: Zu viele Requests in kurzer Zeit
# Triggert bei > 100 Requests in 60 Sekunden von einer IP

# Apache2 Access-Log Format
failregex = ^<HOST> -.*"(GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS).*" (200|301|302|304|400|401|403|404|405|500) .*$

# Ignoriere legitime Bots
ignoreregex = .*(Googlebot|bingbot|Slackbot|facebookexternalhit).*

[Init]
maxretry = 100
findtime = 60
bantime = 3600
