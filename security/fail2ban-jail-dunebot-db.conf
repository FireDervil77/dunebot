# Fail2ban Jail: DuneBot Database Blocked IPs
#
# Diese Jail liest die blocked_ips-Tabelle und sperrt IPs via iptables
#
# Installation:
#   sudo cp fail2ban-jail-dunebot-db.conf /etc/fail2ban/jail.d/dunebot-db.conf
#   sudo systemctl restart fail2ban
#
# Monitoring:
#   sudo fail2ban-client status dunebot-db
#   sudo tail -f /var/log/fail2ban.log
#   sudo tail -f /var/log/dunebot-db.log

[dunebot-db]
enabled  = true
filter   = dunebot-db
backend  = polling

# Custom-Log-Datei (wird von Cronjob generiert)
logpath  = /var/log/dunebot-db.log

# Ban-Einstellungen
banaction = iptables-multiport
            # Alternative: iptables-allports (sperrt alle Ports)
port      = http,https
protocol  = tcp

# Ban-Zeit (permanent, da aus DB)
# -1 = permanent (IP wird erst entsperrt, wenn aus DB entfernt)
bantime   = -1

# Find-Time (wie lange zurück nach Verstößen gesucht wird)
findtime  = 86400

# Max-Retry (1 = sofort sperren bei erstem Fund)
maxretry  = 1

# Action
action   = %(action_mwl)s
           # action_mwl = Ban + E-Mail mit Whois + Log

# E-Mail-Benachrichtigung (optional)
# destemail = admin@example.com
# sender    = fail2ban@dunebot.local

# Logging
logencoding = utf-8
